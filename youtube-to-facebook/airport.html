<script>
const API_TOKEN_2 = 'cc9d1601-cd1c-4b83-9497-59d66819f602';
const API_URL_2 = 'https://api.aviowiki.com/free/airports/search?query=';

async function fetchAirports2(query, listId) {
    const list = document.getElementById(listId);
    
    if (!query) {
        list.style.display = 'none';
        return;
    }
    
    const response = await fetch(`${API_URL_2}${encodeURIComponent(query)}`, {
        headers: {
            'Authorization': `Bearer ${API_TOKEN_2}`
        }
    });

    if (response.ok) {
        const data = await response.json();
        displayAirports(data.content, listId);
        console.log(data.content);
    }
}

                    ${airport.name} - ${airport.servedCity}, ${airport.country.iso2}
                `;*/

            } else {

                    ${airport.name} - ${airport.country.name}
                `;*/
                selected_airport = `${airport.name} - ${airport.country.name}`;
            }
            
            /*item.innerHTML = `
                      <img class="flag" src="https://flagcdn.com/w40/${airport.country.iso2.toLowerCase()}.png" alt="${airport.country.iso2}" /> 
                     
                     <div class="airport-details"><div style="font-weight: bold;">${airport.iata}</div><div>${selected_airport}</div></div>
                  `;*/
            item.innerHTML = `
    <a airport-code="${airport.iata}" href="#" class="airport-item-wrapper from-to w-inline-block" tabindex="0">
        <div fs-cmsfilter-field="to-airport-2">${selected_airport}</div>
        <div class="airport-blur"></div>
        <div fs-cmsfilter-field="from-airport-2" class="text-size-10">${airport.iata}</div>
  </a>
                  `;

            //item.onclick = () => selectAirport(`${airport.iata} / ${airport.name}`, listId);            
            $(item).on('click', function() {
              const selectedAirport = {
                data: airport
              };

              $(".request_input-from").removeClass("placeholder-white");
              $(".request_input-to").removeClass("placeholder-white");
              $(".request_input-date").removeClass("placeholder-white");

              // Retrieve existing data or initialize an empty object
              let storedAirports = JSON.parse(localStorage.getItem('airports')) || { "from-list": [], "to-list": [] };

              if (listId === 'from-list-wrapper') {
                storedAirports["from-list"] = [];  // Reset the "to-list" array
                localStorage.setItem('airports', JSON.stringify(storedAirports)); // Save the updated object
                storedAirports["from-list"].push(selectedAirport);

              } else {
                storedAirports["to-list"] = [];  // Reset the "to-list" array
                localStorage.setItem('airports', JSON.stringify(storedAirports)); // Save the updated object
                storedAirports["to-list"].push(selectedAirport);

              }

              // Save updated data back to localStorage
              localStorage.setItem('airports', JSON.stringify(storedAirports));

              // Log the updated localStorage
              console.log("Updated localStorage:", JSON.parse(localStorage.getItem('airports')));

              selectAirport(`${airport.iata} / ${airport.name}`, listId);
            });

            
            list.appendChild(item);
					}
          
        });
    } else {
        list.style.display = 'none';
    }
}

function selectAirport(value, listId) {
    if (listId === 'from-list-wrapper') {
        document.getElementById('from-airport-2').value = value;
    } else {
        document.getElementById('to-airport-2').value = value;
    }
    document.getElementById(listId).innerHTML = '';
    document.getElementById(listId).style.display = 'none';
}

document.addEventListener("DOMContentLoaded", () => {

    document.getElementById('from-airport-2').addEventListener('input', () => {
        fetchAirports2(document.getElementById('from-airport-2').value, 'from-list-wrapper');
    });

        const passengers = document.getElementById('passengers').value;

        console.log(`Quote requested:\nFrom: ${from}\nTo: ${to}\nDate: ${date}\nPassengers: ${passengers}`);
    });
});

function updateTotalPassengers() {
    let adults = parseInt($('.passengers-input.adults-input').val()) || 0;
    let children = parseInt($('.passengers-input.children-input').val()) || 0;
    let pets = parseInt($('.passengers-input.pets-input').val()) || 0;
    
    let total = adults + children + pets;
    $('.udesly-input-field').val(total);
}

function setupPassengerControls(category) {
    $('.passengers-plus.' + category).click(function(){
        let input = $('.passengers-input.' + category + '-input');
        let val = parseInt(input.val()) || 0;
        input.val(val + 1);
        updateTotalPassengers();
    });

    $('.passengers-minus.' + category).click(function(){
        let input = $('.passengers-input.' + category + '-input');
        let val = parseInt(input.val()) || 0;
        if (val > 0) {
            input.val(val - 1);
        }
        updateTotalPassengers();
    });
}

// Setup controls for adults, children, and pets

setupPassengerControls('children');
