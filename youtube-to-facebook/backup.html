function cleanResponse(text) {
  return decodeURIComponent(text)
    .replace(/&#39;/g, "'") // Fix apostrophes
    .replace(/&quot;/g, '"') // Fix quotation marks
    .replace(/&amp;/g, '&') // Fix ampersands
    .replace(/&lt;/g, '<') // Fix less than sign
    .replace(/&gt;/g, '>') // Fix greater than sign
    .replace(/\b(aren|can|couldn|didn|doesn|don|hadn|hasn|haven|isn|let|mightn|mustn|shouldn|wasn|weren|won|wouldn|it) ?t\b/gi, "$1't") // Fix contractions
    .replace(/\b(we|they|you|I) ?re\b/gi, "$1're") // Fix "we're", "they're"
    .replace(/\b(I|he|she|it) ?s\b(?!\b(is|a|we|will|ve|n't|d|re)\b)/gi, "$1's") // Fix "it's", "he's", but prevent "is" â†’ "i's"
    .replace(/\b(who|what|where|when|why|how) ?s\b(?!\b(is|a|we|will|ve|n't|d|re)\b)/gi, "$1's") // Fix "who's", "what's", but prevent incorrect replacements
    .replace(/\b(I|you|he|she|we|they) ?ll\b/gi, "$1'll") // Fix "I'll", "you'll"
    .replace(/\b(I|you|he|she|we|they) ?ve\b/gi, "$1've") // Fix "I've", "you've"
    .replace(/\b(you|we|they) ?d\b/gi, "$1'd") // Fix "you'd", "we'd"
    .replace(/\b(o|d) ?clock\b/gi, "$1'clock") // Fix "o'clock"
    .replace(/(\w)''(\w)/g, "$1'$2") // Fix double apostrophes like "it''s" â†’ "it's"
    .replace(/(\w)'{2,}/g, "$1'") // Remove leftover double apostrophes
    .replace(/\b(?<!\b(is|as|this|was|has|us|bus|focus)) ?s\b(?!\w)/gi, "$1's"); // Fix possessives but avoid incorrect cases
}
