# Render Blueprint for YouTube to Facebook Automation
# This file enables one-click deployment on Render.com

services:
  # Trending YouTube Shorts Automation
  - type: web
    name: trending-automation
    env: node
    plan: free
    buildCommand: npm install && pip install --upgrade yt-dlp && curl -fsSL https://deno.land/install.sh | sh && export PATH="/opt/render/.deno/bin:$PATH"
    startCommand: export PATH="/opt/render/.deno/bin:$PATH" && node youtube-trending-automation.js
    envVars:
      - key: PATH
        value: /opt/render/.deno/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: FACEBOOK_ACCESS_TOKEN
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: TRENDING_MIN_VIEWS
        value: 0
      - key: TRENDING_MIN_VIEW_VELOCITY
        value: 0
      - key: TRENDING_MIN_ENGAGEMENT_RATE
        value: 0.05
      - key: TRENDING_MAX_VIDEO_AGE_HOURS
        value: 72
      - key: TRENDING_DAILY_POST_LIMIT
        value: 12
      - key: TRENDING_MIN_WAIT_TIME
        value: 3600000
      - key: TRENDING_MAX_WAIT_TIME
        value: 3600000
      - key: TRENDING_ACCEPTED_LANGUAGES
        value: en,tl,fil

  # YouTube Upload Automation (Duterte Content)
  - type: web
    name: youtube-upload
    env: node
    plan: free
    buildCommand: npm install && pip install --upgrade yt-dlp && curl -fsSL https://deno.land/install.sh | sh && export PATH="/opt/render/.deno/bin:$PATH"
    startCommand: export PATH="/opt/render/.deno/bin:$PATH" && node youtube_upload.js
    envVars:
      - key: PATH
        value: /opt/render/.deno/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: FACEBOOK_ACCESS_TOKEN
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false

  # News Highlight Automation (Duterte/PH News → Facebook Reel)
  - type: web
    name: news-highlight-automation
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: node news-highlight-automation.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_CONCURRENCY
        value: "1"
      - key: HIGHLIGHT_MIN_WAIT
        value: "10800000"
      - key: HIGHLIGHT_MAX_WAIT
        value: "21600000"
      - key: HIGHLIGHT_DAILY_LIMIT
        value: "6"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: FACEBOOK_ACCESS_TOKEN
        sync: false
      - key: NEWSDATA_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
