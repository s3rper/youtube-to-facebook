<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Registration Form - Avatar Social Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .dob-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .avatar-selection {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .avatar-option {
            position: relative;
            cursor: pointer;
        }

        .avatar-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .avatar-option img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 3px solid #e0e0e0;
            transition: all 0.3s;
        }

        .avatar-option input[type="radio"]:checked + img {
            border-color: #667eea;
            transform: scale(1.05);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: 400;
            cursor: pointer;
            font-size: 13px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .success-message {
            display: none;
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }

        .error {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
        }

        #registrationData {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 12px;
            word-break: break-all;
        }

        .avatar-placeholder {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Your Account</h1>
        <p class="subtitle">Join our virtual world community</p>

        <form id="registrationForm">
            <div class="form-group">
                <label for="username">Username *</label>
                <input type="text" id="username" name="username" required
                       placeholder="Choose a unique username" minlength="3">
                <div class="error" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" required
                       placeholder="your.email@example.com">
                <div class="error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required
                       placeholder="Create a strong password" minlength="6">
                <div class="error" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label>Date of Birth *</label>
                <div class="dob-group">
                    <select id="dobMonth" name="dobMonth" required>
                        <option value="">Month</option>
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03">March</option>
                        <option value="04">April</option>
                        <option value="05">May</option>
                        <option value="06">June</option>
                        <option value="07">July</option>
                        <option value="08">August</option>
                        <option value="09">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                    <select id="dobDay" name="dobDay" required>
                        <option value="">Day</option>
                    </select>
                    <select id="dobYear" name="dobYear" required>
                        <option value="">Year</option>
                    </select>
                </div>
                <div class="error" id="dobError"></div>
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender">
                    <option value="">Prefer not to say</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="non-binary">Non-binary</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Choose Your Starting Avatar</label>
                <div class="avatar-selection">
                    <div class="avatar-option">
                        <input type="radio" name="avatar" id="avatar1" value="avatar1" required>
                        <label for="avatar1">
                            <div class="avatar-placeholder" style="height: 80px; border-radius: 8px; border: 3px solid #e0e0e0;">A1</div>
                        </label>
                    </div>
                    <div class="avatar-option">
                        <input type="radio" name="avatar" id="avatar2" value="avatar2">
                        <label for="avatar2">
                            <div class="avatar-placeholder" style="height: 80px; border-radius: 8px; border: 3px solid #e0e0e0;">A2</div>
                        </label>
                    </div>
                    <div class="avatar-option">
                        <input type="radio" name="avatar" id="avatar3" value="avatar3">
                        <label for="avatar3">
                            <div class="avatar-placeholder" style="height: 80px; border-radius: 8px; border: 3px solid #e0e0e0;">A3</div>
                        </label>
                    </div>
                    <div class="avatar-option">
                        <input type="radio" name="avatar" id="avatar4" value="avatar4">
                        <label for="avatar4">
                            <div class="avatar-placeholder" style="height: 80px; border-radius: 8px; border: 3px solid #e0e0e0;">A4</div>
                        </label>
                    </div>
                </div>
                <div class="error" id="avatarError"></div>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">
                        I agree to the Terms of Service and Privacy Policy *
                    </label>
                </div>
                <div class="error" id="termsError"></div>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">
                        Send me updates and promotional emails
                    </label>
                </div>
            </div>

            <button type="submit" id="submitBtn">Create Account</button>
        </form>

        <div class="success-message" id="successMessage">
            Registration successful! Your account has been created.
        </div>

        <div id="registrationData"></div>
    </div>

    <script>
        // Populate day options
        const daySelect = document.getElementById('dobDay');
        for (let i = 1; i <= 31; i++) {
            const option = document.createElement('option');
            option.value = i.toString().padStart(2, '0');
            option.textContent = i;
            daySelect.appendChild(option);
        }

        // Populate year options (18-100 years old)
        const yearSelect = document.getElementById('dobYear');
        const currentYear = new Date().getFullYear();
        for (let i = currentYear - 18; i >= currentYear - 100; i--) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            yearSelect.appendChild(option);
        }

        // Handle avatar selection styling
        document.querySelectorAll('.avatar-option input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.avatar-option label > div').forEach(div => {
                    div.style.borderColor = '#e0e0e0';
                    div.style.transform = 'scale(1)';
                });
                if (this.checked) {
                    const div = this.nextElementSibling.querySelector('div');
                    div.style.borderColor = '#667eea';
                    div.style.transform = 'scale(1.05)';
                }
            });
        });

        // Form submission
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Clear previous errors
            document.querySelectorAll('.error').forEach(el => el.textContent = '');

            // Get form data
            const formData = new FormData(this);
            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });

            // Validate age (must be 18+)
            const birthYear = parseInt(data.dobYear);
            const age = currentYear - birthYear;
            if (age < 18) {
                document.getElementById('dobError').textContent = 'You must be at least 18 years old to register.';
                return;
            }

            // Simulate form submission
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';

            setTimeout(() => {
                // Show success message
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('registrationForm').style.display = 'none';

                // Display registered data for testing purposes
                const dataDiv = document.getElementById('registrationData');
                dataDiv.style.display = 'block';
                dataDiv.innerHTML = '<strong>Registration Data (for testing):</strong><br><pre>' +
                                   JSON.stringify(data, null, 2) + '</pre>';

                console.log('Registration successful:', data);
            }, 1500);
        });
    </script>
</body>
</html>
