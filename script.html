<!-- Medicare Number Validation
<script>
document.addEventListener("DOMContentLoaded", function () {
  const input = document.getElementById("medicare-num");

  input.addEventListener("input", function () {
    // Remove non-digits
    let value = input.value.replace(/\D/g, '');

    // Limit to max of 11 digits
    value = value.slice(0, 11);

    // Format as XXXX-XXX-XXXX
    if (value.length > 7) {
      value = value.replace(/(\d{4})(\d{3})(\d{0,4})/, '$1-$2-$3');
    } else if (value.length > 4) {
      value = value.replace(/(\d{4})(\d{0,3})/, '$1-$2');
    }

    input.value = value;
  });
});
</script>

<!-- Date Field Validation -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const dateInputs = document.querySelectorAll('input[date]');

  dateInputs.forEach(input => {
    input.addEventListener("input", function () {
      // Remove all non-digit characters
      let value = input.value.replace(/\D/g, '');

      // Limit to 8 digits (MMDDYYYY)
      value = value.slice(0, 8);

      // Format to MM-DD-YYYY
      if (value.length >= 5) {
        value = value.replace(/(\d{2})(\d{2})(\d{1,4})/, '$1-$2-$3');
      } else if (value.length >= 3) {
        value = value.replace(/(\d{2})(\d{1,2})/, '$1-$2');
      }

      input.value = value;
    });
  });
});
</script>
